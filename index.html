/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
=========================================

This is the main gameplay panel.

Controls:
- size and layout of the game area
- background styling and effects
- visual feedback (glow, boss mode, hit effects)
- positioning of UI elements (autosave, etc.)

-----------------------------------------
SAFE TO EDIT:
- colors, shadows, glow effects
- padding, margins
- background / blur effects
- border styles
- animation intensity

-----------------------------------------
USE CAUTION:
- width / max-width / flex settings
- position: relative (needed for overlays like autosave)
- removing box-sizing may break layout

-----------------------------------------
DO NOT REMOVE:
- #gameBox selector (used throughout JS)
- .boss-mode class (boss visuals tied to logic)
- .hit class (damage feedback)

-----------------------------------------
TIP:
This controls how the game FEELS visually.
You can restyle it completely—just keep structure intact.

========================================= */
#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;
    background: radial-gradient(circle at center, rgba(120,40,10,0.85) 0%, rgba(40,15,5,0.95) 60%, rgba(10,5,2,0.98) 100%);
    backdrop-filter: blur(4px);
    border-radius: 14px;
    box-sizing: border-box;
    box-shadow: 0 0 12px rgba(251,191,36,0.6), 0 0 25px rgba(249,115,22,0.5), 0 0 60px rgba(220,38,38,0.35);
    border: 1px solid rgba(251,191,36,0.25);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid #f97316;
    box-shadow: 0 0 25px rgba(249,115,22,0.6), 0 0 50px rgba(251,191,36,0.4);
}

/* Boss maze track styling */
.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Boss-specific glow */
.boss10 .boss-icon{ filter: drop-shadow(0 0 8px rgba(255,120,0,0.9)); }
.boss20 .boss-icon{ filter: drop-shadow(0 0 8px rgba(255,60,0,0.9)); }
.boss30 .boss-icon{ filter: drop-shadow(0 0 10px rgba(255,0,0,1)); }
   
/* Damage effect when boss/player is hit (visual feedback) */
.hit { box-shadow: 0 0 60px #ef4444, inset 0 0 40px #7f1d1d !important; animation: hitshake 0.4s ease; }

/* Autosave indicator — positioned relative to gameBox */
#autosave { position: absolute; top: 15px; right: 15px; font-size: 11px; opacity: 0.5; font-style: italic; }

/* Adds a graph box for questions with graphs */
#questionImageBox{
  margin: 0 auto 12px auto;
  text-align: center;
  display: none;
}

#questionImageBox img{
  max-width: 100%;
  width: 420px;
  height: auto;
  border-radius: 10px;
  box-shadow: 0 0 12px rgba(255,255,255,0.08);
}

/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
=========================================
Controls all text styling in the game:
- question readability
- headers and titles
- boss emphasis text
- hints and feedback
- visual hierarchy
-----------------------------------------
SAFE TO EDIT:
- font sizes
- colors
- text shadows
- spacing (margin, line-height)
- stylistic effects (italic, uppercase, etc.)
-----------------------------------------
USE CAUTION:
- extreme font sizes (may break layout)
- removing margins (can cause overlap)
- removing contrast (hurts readability)
-----------------------------------------
DO NOT REMOVE:
- #question (core content display)
- .boss-title (boss transitions)
- .boss-q (boss summaries)
- .fade-out-text (feedback animation)
-----------------------------------------
TIP:
Prioritize readability over style.
If students can’t read it quickly, the system fails.
========================================= */
h2 { text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px; }

/* Main question text — keep readable and centered */
#question { font-size: clamp(20px, 4vw, 22px); line-height: 1.4; font-weight: 600; margin: 14px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

/* Boss/summary title — high emphasis text */
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block;color: #fbbf24;text-shadow:0 0 10px rgba(251,191,36,0.6),0 0 25px rgba(249,115,22,0.4);}}

/* Area/zone label — subtle contextual info */
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }

/* Boss summary text — left-aligned for readability */
.boss-q {font-style: normal; line-height: 1.5; font-size: 24px;border-left: 3px solid #f97316;padding-left: 15px;margin: 20px 0;text-align: left; color: #fef3c7; box-shadow: -4px 0 10px rgba(249,115,22,0.25);}

/* Optional hint display (calculation or guidance) */
.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }
    
/* Temporary feedback text (auto fades out) */
.fade-out-text { animation: fadeOut 5s forwards; font-weight: bold; color: #4ade80; }

/* Add styling to wizard text */
#message {margin-top: 10px; font-style: italic; letter-spacing: 0.5px; text-align: center; color: #cbd5f5; opacity: 0.85;}

/* Foundry override */
.foundry #message {color: #fbbf24;font-size: 17px; font-style: italic; margin-top: 12px; margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; text-shadow:
        0 0 8px rgba(251,191,36,0.8),
        0 0 18px rgba(249,115,22,0.6),
        0 0 30px rgba(220,38,38,0.35);}
   
/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
=========================================
Controls all interactive elements:
- answer buttons
- hover/active feedback
- layout of answer choices
- utility buttons (fullscreen, etc.)
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- hover/active effects (scale, glow, etc.)
- padding, spacing, font sizes
- button shapes (border-radius)
-----------------------------------------
USE CAUTION:
- removing hover/active effects (reduces feedback)
- extreme sizing (can break layout or overlap)
- flex settings in .answers (affects layout)
-----------------------------------------
DO NOT REMOVE:
- button selector (used globally)
- .answers layout (controls answer positioning)
-----------------------------------------
TIP:
Buttons should feel responsive and clickable.
Visual feedback = better engagement.
========================================= */

/* Base button styling — applies to all buttons */
button {padding: 12px 22px; margin: 6px; font-size: 16px; cursor: pointer;
    /* ALWAYS HOT */
    background: linear-gradient(180deg, #ea580c, #7c2d12);     color: #fef3c7;
    border: 1px solid rgba(251,191,36,0.4);
    border-radius: 8px;
    box-shadow:
        0 0 10px rgba(249,115,22,0.4),
        inset 0 0 10px rgba(0,0,0,0.4);
    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover { background: linear-gradient(180deg, #f97316,#ea580c);
    box-shadow:
        0 0 20px rgba(251,191,36,0.7),
        0 0 35px rgba(249,115,22,0.5);
    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */
button:active {transform: scale(0.96);}

/* Answer container — controls layout of choices */
.answers { display: flex; flex-direction: column; justify-content: center; gap: 12px; width: 100%}

/* Individual answer buttons — flexible sizing */
.answers button { flex: 1 1 100%; min-height: 60px; max-width: 100%; padding: 15px; font-size: 18px; margin: 0; }

/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {position: absolute;top: 12px;left: 12px;
    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fef3c7;
    /* forged metal look */
    background: linear-gradient(180deg,#7c2d12,#3f1a0d);
    border: 1px solid rgba(251,191,36,0.4); border-radius: 6px; cursor: pointer; box-shadow: 0 0 10px rgba(249,115,22,0.4), inset 0 0 6px rgba(0,0,0,0.6); transition: all 0.15s ease;}
   .fullscreenBtn:active {transform: scale(0.95); box-shadow: 0 0 8px rgba(249,115,22,0.3),inset 0 0 10px rgba(0,0,0,0.8);}

.continue-btn {background: linear-gradient(180deg, #ea580c, #7c2d12);color: #fef3c7;font-weight: bold;padding: 14px 40px;font-size: 18px;border-radius: 8px;border: 1px solid rgba(251,191,36,0.4);cursor: pointer; box-shadow:
        0 0 15px rgba(249,115,22,0.5),0 0 30px rgba(251,191,36,0.3);transition: all 0.15s ease;}
.continue-btn:hover {background: linear-gradient(180deg, #f97316, #ea580c); box-shadow: 0 0 25px rgba(251,191,36,0.7), 0 0 40px rgba(249,115,22,0.5);transform: scale(1.03);}

#continueBtn:active {transform: scale(0.97);box-shadow: 0 0 10px rgba(249,115,22,0.3),inset 0 0 10px rgba(0,0,0,0.6);}

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
=========================================
Controls visual progression feedback:
- progress bar (top fill indicator)
- maze track (30-room grid)
- current position highlight
- boss room visual cues
-----------------------------------------
SAFE TO EDIT:
- colors, gradients, glow effects
- sizes (maze-box, spacing, gap)
- animation styles (pulse, transitions)
- grid sizing (with care)
-----------------------------------------
USE CAUTION:
- grid-template-columns (affects layout structure)
- maze-box size vs spacing (can cause overflow)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT MODIFY:
- #mazeTrack structure (10 columns × 3 rows = 30 rooms)
- nth-child(10, 20, 30) unless boss rooms are changed globally

Changing boss room visuals here requires matching updates in:
- game logic (boss triggers)
- progression system
-----------------------------------------
TIP:
This system gives players a sense of movement and progress.
If it's unclear, motivation drops.
========================================= */
    
/* Progress bar container — background track */
#progressBar { width: 100%; height: 22px; background: #2d3748; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    
/* Progress fill — width controlled by JS */
#progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #fbbf24, #f97316, #dc2626); transition: width 0.4s ease; }

/* Maze grid layout — 10 columns = 30 total rooms */
#mazeTrack { display: grid; grid-template-columns: repeat(10, 36px); justify-content: center; gap: 10px; margin: 25px auto; }
    
/* Individual room cell — default state */
.maze-box { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; background: rgba(60, 20, 10, 0.4); border: 1px solid rgba(2449, 115, 22, 0.2); transition: all 0.3s ease; }

/* Current room highlight — animated pulse */
.maze-box.active { background: rgba(251,191,36,0.3); border: 2px solid #fbbf24; box-shadow: 0 0 10px rgba(251,191,36,0.7), 0 0 20px rgba(249,115,22,0.5);z-index: 10; animation: activePulse 1s infinite alternate;}

.maze-box.completed {background: rgba(249,115,22,0.6); box-shadow: 0 0 8px rgba(249,115,22,0.5);}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) { text-shadow: 0 0 8px #fbbf24, 0 0 18px #f97316; }
.maze-box:nth-child(20) { text-shadow: 0 0 8px #f97316, 0 0 18px #ea580c; }
.maze-box:nth-child(30) { text-shadow: 0 0 10px #eab308, 0 0 25px #fbbf24; }

/*Streak styling*/
.streak{display:inline-flex;align-items:center;gap:10px;font-weight:bold;}
.streak-icon{
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;

    /* layered glow */
    filter:
        drop-shadow(0 0 8px rgba(255,140,0,0.9))
        drop-shadow(0 0 14px rgba(255,80,0,0.6));

    /* subtle inner heat illusion */
    background: radial-gradient(circle,
        rgba(255,220,150,0.6) 0%,
        rgba(255,140,0,0.4) 40%,
        transparent 70%
    );

    animation: pulseHeat 1.8s ease-in-out infinite;
}
   
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
=========================================
Controls visual display of rewards:
- artifact drop popup (after boss wins)
- artifact vault (persistent collection)
- locked vs unlocked states
- reward animations and glow effects
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- artifact sizes and spacing
- glow effects and animations
- text labels and styling
-----------------------------------------
USE CAUTION:
- opacity (controls locked vs unlocked visibility)
- transform/scale (can affect layout spacing)
- animation timing (too fast = distracting)
-----------------------------------------
DO NOT MODIFY:
- .artifactSlot.unlocked (linked to JS unlock logic)
- element IDs (#artifactDrop, #artifactVault, etc.)
- display behavior (used for showing/hiding rewards)

Changing these may break:
- artifact unlocking visuals
- vault persistence feedback
-----------------------------------------
TIP:
This is your reward system.
If it doesn’t feel rewarding, engagement drops.
========================================= */
    
/* Reward popup — appears after boss victory */
#artifactDrop {margin-top: 20px; padding: 14px; /* 🔥 heated surface */ background: radial-gradient(
circle at center, rgba(120,40,10,0.6), rgba(20,8,4,0.95)); border-radius: 10px; border: 1px solid rgba(251,191,36,0.25); box-shadow: 0 0 15px rgba(249,115,22,0.3), inset 0 0 25px rgba(120,40,10,0.4);text-align: center;}
    
/* Artifact image in popup */
#artifactImage { width: 96px; margin-bottom: 8px; }
#artifactDrop img { filter: drop-shadow(0 0 12px rgba(251,191,36,.9)) drop-shadow(0 0 25px rgba(249,115,22,.6)); }

/* Persistent artifact collection display (top panel) */
#artifactVault{margin-top: -6px; width: 220px; padding: 18px; border-radius: 12px;
    /* molten vault look */
    background: radial-gradient(circle at top, rgba(180,60,20,0.6), rgba(40,15,5,0.95));
    border: 1px solid rgba(251,191,36,0.25);
    box-shadow: 0 0 15px rgba(249,115,22,0.25), inset 0 10px 30px rgba(251,191,36,0.15),inset 0 -10px 20px rgba(0,0,0,0.6);
    text-align: center;
}
#artifactVault h3{ color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.6);}

/* Layout container for artifact slots */
.vaultRow { display: flex; justify-content: center; align-items:flex-end; gap: 15px; flex-wrap:wrap;}

/* Individual artifact slot (default = locked state) */    
.artifactSlot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; text-align:center; opacity: .25; transition: all .4s ease;}

/* Locked artifact image (grayscale effect) */    
.artifactSlot img { width: 45px; margin-bottom:4px;filter: brightness(0.3) contrast(0.8);; transition: all .4s ease; }

/* Unlocked artifact — triggered by JS (DO NOT REMOVE) */    
.artifactSlot span { display: block; font-size: 13px; color: rgba(251,191,36,0.35); margin-top: 8px; line-height: 1.2; }

/* Glow + animation for unlocked artifacts */
.artifactSlot.unlocked { opacity: 1; transform: scale(1.05); }
.artifactSlot.unlocked img {filter: drop-shadow(0 0 14px rgba(251,191,36,0.9))drop-shadow(0 0 25px rgba(249,115,22,0.6)); animation: relicPulse 2.5s ease-in-out infinite; }
.artifactSlot.unlocked span { color: #fef3c7; font-weight: 600; text-shadow: 0 0 6px rgba(251,191,36,0.4); }

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
=========================================
Controls visual intensity and immersion:
- boss animations (floating, shaking)
- boss-specific glow effects
- environmental effects (torches)
-----------------------------------------
SAFE TO EDIT:
- glow colors (match your theme)
- animation intensity and timing
- boss icon size
- torch placement and styling
-----------------------------------------
USE CAUTION:
- removing animations (reduces feedback and immersion)
- extreme sizing (can break layout)
- opacity/filter changes (affects visibility)
-----------------------------------------
DO NOT REMOVE:
- .boss-shake (triggered during boss hits)
- .bossIcon (used for boss rendering)
- .torch (environmental effect tied to game start)

Removing these will:
- eliminate combat feedback
- reduce visual clarity during bosses
-----------------------------------------
TIP:
This section controls how "intense" the game feels.
Subtle changes here dramatically affect experience.
========================================= */
    
/* Hit animation — triggered when boss takes damage */
.boss-shake {animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;}

/* Boss image display — includes floating animation */
.bossIcon { width: 96px; height: auto; display: block; margin: 0 auto 12px auto; animation: bossFloat 4s ease-in-out infinite; }

/* Boss-specific glow effects (safe to recolor per theme, change name before glow to match your boss name) */
.tyrantGlow { filter: drop-shadow(0 0 14px rgba(96,165,250,.8)); }
.underwriterGlow { filter: drop-shadow(0 0 14px rgba(242,125,9,.8)); }
.finalBoss { filter: drop-shadow(0 0 18px rgba(239,68,68,.9)); }

/* Ambient torch effect — decorative, shown during gameplay */
.torch { position: absolute; width: 70px; top: 30px; z-index: 10; animation: torchFlicker 3s infinite alternate; pointer-events: none; opacity: .95; filter: drop-shadow(0 0 12px rgba(255,180,80,.7)); display:none; }

/* Torch positioning (left/right sides of screen) */
.left-torch { left: 18px; }
.right-torch { right: 18px; transform: scaleX(-1); }
/* =========================================
   8. FULLSCREEN SCREENS & TRANSITIONS — SAFE TO CUSTOMIZE
=========================================
Controls full-screen UI layers:
- start screen (game entry)
- hallway transition overlay (between rooms)
- transition text display
-----------------------------------------
SAFE TO EDIT:
- background images (start screen, hallway scenes)
- text styling and layout
- overlay colors and opacity
- animation timing and effects
-----------------------------------------
USE CAUTION:
- position: fixed (required for full-screen coverage)
- z-index layering (controls what appears on top)
- opacity / pointer-events (controls visibility + interaction)
-----------------------------------------
DO NOT REMOVE:
- #startScreen (entry point to game)
- #hallwayTransition + .active (transition system)
- #hallwayText (text container)

Removing these will break:
- game start flow
- transition animations
- progression continuity
-----------------------------------------
TIP:
This section controls immersion and pacing between actions.
Good transitions = smoother experience.
========================================= */

/* Fullscreen start screen — shown before game begins */    
#startScreen{
  position: fixed;
  inset: 0;
  background-image: url('start screen image.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 100;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  overflow-y: auto;
  overflow-x: hidden;
  padding: 0px 20px;
  box-sizing: border-box;
}

/* Transition overlay — appears between rooms (controlled by JS) */
#hallwayTransition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)), url('hallway1.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-size: 26px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.2s ease; animation: hallwayZoom 3.2s ease-out forwards; }

/* Activates transition visibility (DO NOT REMOVE) */    
#hallwayTransition.active { opacity: 1; }

/* Text container for transition messages */
#hallwayText { max-width: 600px; background: rgba(0,0,0,0.55); padding: 30px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 0 25px rgba(0,0,0,0.6); }

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
=========================================
Defines all animation keyframes used throughout the game:
- environmental effects (torch flicker)
- combat feedback (hit shake, boss shake)
- progression feedback (active pulse, victory glow)
- character motion (boss float, wizard float)
- reward effects (relic pulse)
- UI transitions (fade in/out)
-----------------------------------------
SAFE TO EDIT:
- animation intensity (scale, movement distance)
- timing (duration in CSS usage, not here)
- visual effects (glow, brightness, shadows)
-----------------------------------------
USE CAUTION:
- transform values (affects layout positioning)
- extreme motion (can feel distracting or chaotic)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT REMOVE:
- keyframe names (used across CSS and JS)
  e.g. torchFlicker, bossShake, activePulse, etc.

Renaming or deleting these will break:
- visual feedback
- boss effects
- UI transitions
-----------------------------------------
TIP:
Animations should reinforce feedback, not distract.
Subtle > excessive.
========================================= */

/* Ambient lighting effect (environmental immersion) */

    if(!tagBucket.byType[key]){
        tagBucket.byType[key] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return tagBucket.byType[key];
}

function inferObjective(question){
    if(!question) return "general";
    if(question.objective) return question.objective;
    const q = (question.q || "").toLowerCase();
    const tag = question.tag || "general";
    const type = question.type || "default";

    if(tag === "production"){
        if(q.includes("isoquant")) return "isoquant_reading";
        if(q.includes("technical substitution") || q.includes("mrts")) return "mrts";
        if(q.includes("marginal product")) return "marginal_product";
        if(q.includes("substitut")) return "input_substitution";
        if(q.includes("returns to scale")) return "returns_to_scale";
        if(q.includes("technology")) return "technology_productivity";
    }
    if(tag === "costs"){
        if(q.includes("fixed cost")) return "fixed_vs_variable";
        if(q.includes("average total cost") || q.includes("atc")) return "atc_relationships";
        if(q.includes("average variable cost") || q.includes("avc")) return "shutdown_components";
        if(q.includes("marginal cost") || q.includes("mc")) return "mc_relationships";
        if(q.includes("wage") || q.includes("input prices")) return "cost_curve_shifts";
    }
    if(tag === "profit"){
        if(q.includes("shut down")) return "shutdown_rule";
        if(q.includes("profit maxim")) return "mr_mc_rule";
        if(q.includes("zero economic profit")) return "normal_profit";
        if(q.includes("loss")) return "profit_vs_loss";
    }
    if(tag === "competition"){
        if(q.includes("price taker") || q.includes("perfectly elastic")) return "price_taking";
        if(q.includes("supply curve")) return "firm_supply";
        if(q.includes("market price")) return "firm_vs_market_price";
    }
    if(tag === "market"){
        if(q.includes("entry")) return "entry_adjustment";
        if(q.includes("exit")) return "exit_adjustment";
        if(q.includes("long run equilibrium")) return "long_run_equilibrium";
        if(q.includes("demand")) return "market_shift_sequences";
    }
    if(tag === "efficiency"){
        if(q.includes("allocative")) return "allocative_efficiency";
        if(q.includes("productive")) return "productive_efficiency";
        if(q.includes("full efficiency")) return "combined_efficiency";
    }

    return `${tag}_${type}`;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];
}

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: inferObjective(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = Infinity;

    entries.forEach(tag => {
        const weakness = (conceptMemory[tag] || 0) + (1 - (getTagFluency(tag) || 0));
        if(weakness < weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function resetRemediationState(){
    remediationState = {
        active: false,
        stage: null,
        tag: null,
        objective: null,
        sourceType: null,
        returnRoom: null,
        originQuestionId: null,
        careless: false
    };
    detourActive = false;
    detourReturnRoom = null;
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: inferObjective(question),
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getRemediationStageLabel(stage){
    if(stage === "repair") return "Concept Repair";
    if(stage === "bridge") return "Bridge Repair";
    return "Recovery Retest";
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = []){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));
    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

function getRetestPoolName(){
    if(room <= 9) return "easy";
    if(room <= 19) return "medium";
    if(room <= 25) return "hard";
    if(room <= 29) return "hard";
    return "elite";
}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm"){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);
    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, []);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
        const repairPool = easyConceptPools[state.tag] || [];
        const repairCandidates = getQuestionsMatchingNeed(repairPool, state.objective, state.tag, excludeIds);
        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, { mode: "support", purpose: "repair" });
        }
    }

    if(state.stage === "bridge"){
        const bridgePool = mediumConceptPools[state.tag] || [];
        const bridgeCandidates = getQuestionsMatchingNeed(bridgePool, state.objective, state.tag, excludeIds);
        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, { mode: "support", purpose: "confirm" });
        }
    }

    const retestPoolName = getRetestPoolName();
    return pickRemediationFromBank(retestPoolName, state.objective, state.tag, state.stage === "retest" ? "challenge" : "confirm");
}

function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

{ id:184, q:"Refer to the graph of MC, ATC, and AVC for a price-taking firm. If market price is P3, what is the firm's best short-run decision?", options:["Shut down immediately because price is below ATC","Continue operating and produce Q3 because price covers AVC but not ATC","Produce Q2 because that is where ATC is minimized","Exit the market because the firm is earning an economic loss"], a:1, tag:"profit", type:"interpretation", objective:"9.4", image:"shutdown.png", feedback:"At price P3, the firm produces where P = MC, which is Q3. Because P3 is above AVC but below ATC, the firm operates in the short run and earns a loss."},
{ id:185, q:"Refer to the graph of MC, ATC, and AVC for a price-taking firm. Which statement correctly identifies the shutdown point?", options:["The shutdown point is P2 at Q2 because ATC is minimized there","The shutdown point is P4 at Q4 because AVC is minimized there","The shutdown point is P3 at Q3 because price equals marginal cost there","The shutdown point is P1 at Q1 because the firm earns positive profit there"], a:1, tag:"costs", type:"trap", objective:"8.3", image:"shutdown.png", feedback:"The shutdown point occurs where price equals minimum AVC. On the graph, AVC reaches its minimum at P4 and the corresponding output is Q4."},
{ id:186, q:"Refer to the graph of MC, ATC, and AVC for a price-taking firm. Suppose the market price is P1. What output level will the firm choose?", options:["Q4","Q3","Q2","Q1"], a:3, tag:"competition", type:"calculation", objective:"9.4", image:"shutdown.png", feedback:"A competitive firm chooses output where price equals marginal cost, as long as price is at least AVC. At price P1, the horizontal price line intersects MC at Q1, so the firm produces Q1."},
{ id:187, q:"Refer to the graph of a price-taking firm. If the market price is P2, which statement is correct?", options:["The firm produces q1 and earns zero economic profit","The firm produces q2 and earns positive economic profit","The firm produces q2 and earns an economic loss","The firm shuts down because price is below ATC"], a:1, tag:"profit", type:"interpretation", objective:"9.2", image:"longrun.png", feedback:"At price P2, the firm produces where price equals marginal cost, which is point b at q2. Because P2 is above ATC at q2, the firm earns positive economic profit."},
{ id:188, q:"Refer to the graph. Suppose the market begins at point A and then shifts to point C. What change best explains this movement?", options:["Demand decreases while supply stays constant","Demand increases while supply stays constant","Supply decreases while demand stays constant","Supply increases while demand stays constant"], a:1, tag:"market", type:"trap", objective:"10.1", image:"longrun.png", feedback:"Point A is where D1 intersects S1. Point C is where D2 intersects S1. Supply stays at S1 while demand shifts right from D1 to D2, raising both equilibrium price and quantity."},
{ id:189, q:"Refer to the graph of a price-taking firm. Which output level corresponds to the firm's break-even point?", options:["q3","q1","q2","The firm never breaks even on this graph"], a:1, tag:"costs", type:"calculation", objective:"8.3", image:"longrun.png", feedback:"The break-even point occurs where price equals ATC at the profit-maximizing output. On the graph, that happens at point a, where P1 intersects both MC and ATC, so the firm produces q1."},
{ id:190, q:"Refer to the graph of a price-taking firm. If market price falls to P3, what is the firm's best short-run decision?", options:["Shut down immediately because price is below AVC","Produce q3 and continue operating at a loss","Produce q1 because that is where ATC is minimized","Exit the market because price is below ATC"], a:1, tag:"profit", type:"trap", objective:"9.4", image:"longrun.png", feedback:"At price P3, the firm still produces where price equals marginal cost, which is q3. Because the graph does not show price below AVC, the firm continues operating in the short run even though it earns a loss."},
{ id:191, q:"Refer to the graph. If the market is initially at point A and then moves to point B, which change occurred?", options:["Demand increased while supply stayed constant","Demand decreased while supply stayed constant","Supply increased while demand stayed constant","Supply decreased while demand stayed constant"], a:2, tag:"market", type:"interpretation", objective:"10.1", image:"longrun.png", feedback:"Point A is the intersection of D1 and S1, while point B is the intersection of D1 and S2. Demand stays fixed at D1 and supply shifts right from S1 to S2, increasing equilibrium quantity and lowering equilibrium price."},
{ id:192, q:"Refer to the graph. Which point represents a market outcome with both a higher equilibrium price and a lower equilibrium quantity than point B?", options:["A","C","D","No labeled point satisfies both conditions"], a:1, tag:"competition", type:"calculation", objective:"10.1", image:"longrun.png", feedback:"Relative to point B, point C has a higher price level and a lower quantity. That makes C the outcome with higher equilibrium price and lower equilibrium quantity than B."},
{ id:193, q:"Refer to the isoquant graph. As the firm moves from point C to point D, what is the marginal rate of technical substitution of labor for capital?", options:["0.8","1","1.25","2.0"], a:2, tag:"production", type:"calculation", objective:"7.3", image:"isoquant.png", feedback:"From C to D, labor increases by 8 units while capital decreases by 10 units. MRTS = capital given up ÷ labor gained = 10 ÷ 8 = 1.25."},
{ id:194, q:"Refer to the isoquant graph. Moving from point B to point C on isoquant Q1, what happens to the firm's use of labor and capital?", options:["Labor decreases while capital increases","Both labor and capital increase","Labor increases while capital decreases","Both labor and capital decrease"], a:2, tag:"production", type:"interpretation", objective:"7.3", image:"isoquant.png", feedback:"Point B uses 4 units of labor and 26 units of capital, while point C uses 8 units of labor and 20 units of capital. Labor rises and capital falls along the same isoquant."},
{ id:195, q:"Refer to the isoquant graph. Which statement is best supported by points A, B, C, and D on isoquant Q1?", options:["The firm must use more of both inputs to keep output constant","Labor and capital can be substituted for one another while holding output constant","Capital is the only input that matters for production","The isoquant shows combinations that minimize cost"], a:1, tag:"production", type:"trap", objective:"7.3", image:"isoquant.png", feedback:"Points A, B, C, and D all lie on isoquant Q1, meaning they produce the same output with different combinations of labor and capital. That shows input substitution, not cost minimization by itself."}

    { id:5002, q:"A firm adopts technology that raises marginal product. At the same time, wages rise. Which conclusion is most defensible?", options:["Marginal cost must fall","Marginal cost must rise","The effect on marginal cost is ambiguous without knowing which force is larger","Output must remain unchanged"], a:2, tag:"production", type:"trap", objective:"8.4", feedback:"Higher productivity lowers marginal cost, but higher wages raise it. The net effect depends on which change dominates." },
    { id:5003, q:"A student claims: 'If P = MC, the firm must also be productively efficient.' What is wrong with that claim?", options:["P = MC refers to allocative efficiency, not necessarily minimum ATC","P = MC means the firm is earning positive profit","P = MC means the firm should shut down","P = MC only applies to monopolies"], a:0, tag:"efficiency", type:"trap", objective:"10.3", feedback:"Allocative efficiency is P = MC. Productive efficiency requires production at minimum ATC." },
    { id:5004, q:"A firm is producing where MC is rising and below ATC. Which statement is correct?", options:["ATC must be rising because MC is rising","ATC can still be falling as long as MC remains below ATC","The firm must be productively efficient","The firm must be earning zero profit"], a:1, tag:"costs", type:"trap", objective:"8.3", feedback:"MC can rise while ATC falls. The key is whether MC is above or below ATC." },
    { id:5005, q:"A perfectly competitive firm sees the market price fall. At the new price, P is below ATC but above AVC. Which combination is correct?", options:["The firm shuts down immediately and exits immediately","The firm continues in the short run and earns a loss","The firm raises price to cover ATC","The firm expands output because losses are temporary"], a:1, tag:"competition", type:"integration", objective:"9.4", feedback:"A price-taking firm cannot raise price. If P > AVC, it continues in the short run even if it earns a loss." },
    { id:5006, q:"A firm is at minimum ATC, but market price is below that ATC. What is true?", options:["The firm is productively efficient but earning a loss","The firm is allocatively efficient and earning profit","The firm should increase output because MC must be below price","The firm is in long-run competitive equilibrium"], a:0, tag:"costs", type:"integration", objective:"8.3", feedback:"Minimum ATC means productive efficiency. Profit depends on price relative to ATC." },
    { id:5007, q:"In a competitive market, firms earn positive profit after demand rises. Why does this profit tend not to persist?", options:["Because individual firms lower prices voluntarily","Because entry increases market supply and pushes price down","Because marginal cost automatically becomes zero","Because AVC rises until shutdown occurs"], a:1, tag:"market", type:"multi-step", objective:"10.2", feedback:"Profit attracts entry. Entry shifts supply right. Price falls. Profit gets competed away." },
    { id:5008, q:"A firm can substitute capital for labor after wages rise. Which result is most likely if substitution is easy?", options:["The cost increase from higher wages is partly muted","The firm must shut down immediately","The production function disappears","The firm becomes a price maker"], a:0, tag:"production", type:"integration", objective:"7.5", feedback:"Input substitution lets the firm adjust away from the now-more-expensive input, reducing the damage from the wage increase." },
    { id:5009, q:"A market outcome has P > MC. Which interpretation is strongest?", options:["Output is too high from society's perspective","Output is too low from society's perspective","The market is productively efficient","Firms must be earning zero economic profit"], a:1, tag:"efficiency", type:"interpretation", objective:"10.3", feedback:"If P > MC, consumers value another unit more than it costs to produce. Output is too low." },
    { id:5010, q:"A firm is earning zero economic profit and producing where P = MC = minimum ATC. What does this describe?", options:["Short-run shutdown","Long-run competitive equilibrium","Monopoly pricing","A loss-minimizing firm below AVC"], a:1, tag:"market", type:"integration", objective:"10.2", feedback:"That is the full long-run competitive equilibrium package: allocative efficiency, productive efficiency, and zero economic profit." },

    { id:5012, q:"A firm hires more labor while holding capital fixed. Output rises, but each additional worker adds less output than the previous worker. Which explanation is best?", options:["The firm is experiencing diminishing marginal product","The firm is experiencing increasing returns to scale","The firm is reducing fixed cost","The firm has become a price maker"], a:0, tag:"production", type:"interpretation", objective:"7.2", feedback:"With one input fixed, additional units of the variable input eventually add less extra output." },

    { id:5014, q:"A firm doubles labor and capital, but output less than doubles. What does this show?", options:["Increasing returns to scale","Constant returns to scale","Decreasing returns to scale","Diminishing marginal product only"], a:2, tag:"production", type:"interpretation", objective:"7.4", feedback:"When all inputs rise proportionally but output rises less than proportionally, the firm has decreasing returns to scale." },

    { id:5016, q:"A firm has MP_L/w greater than MP_K/r. What should the firm do to reduce cost for a given output?", options:["Use more labor and less capital","Use more capital and less labor","Use less of both inputs","Keep the input mix unchanged"], a:0, tag:"costs", type:"calculation", objective:"8.2", feedback:"Labor gives more marginal product per dollar, so the firm should substitute toward labor until the ratios equalize." },

// =============================================
// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
		q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
		image: question.image
    };

	// Store correct answer BEFORE shuffle
    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

    }

            if (filtered.length === 0) filtered = available;
        }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

usedQuestions[poolName].push(question.id)

// Track types
lastTypes.push(question.type)
if(lastTypes.length > 3){
lastTypes.shift()
}

    return question;
}

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function displayQuestion() {
    const optionsElement = document.getElementById("answers");
    optionsElement.innerHTML = "";

    currentQuestion.options.forEach((option, index) => { 
        const btn = document.createElement("button");
        btn.innerText = option;

        optionsElement.appendChild(btn);
    });
}

// =============================================
// ANSWER HANDLER — CRITICAL SYSTEM
// =============================================
// Controls:
// - correct/incorrect logic
// - streaks
// - setbacks
// - boss damage
// - adaptive memory updates
//
// DO NOT MODIFY unless you understand:
// - conceptMemory
// - detour system
// - progression penalties
//
// Check for artifact names and CHANGE
     
function answer(choice) {
    // --- GLOBAL MEMORY DECAY ---
    for(let tag in conceptMemory){
    conceptMemory[tag] *= 0.95;
    }
   
    totalAttempts++;
   
    const isBossRoom = (room === 10 || room === 20 || room === 30);
    const msgElement = document.getElementById("message");
    const wizard = document.getElementById("wizardImage");
    const isCorrect = (choice === currentQuestion.a);
    const responseTime = Date.now() - questionStartTime;

    recordAdaptiveAttempt(currentQuestion, isCorrect, responseTime);

    // =============================================
    // 🔥 UPDATE STREAK FIRST (SOURCE OF TRUTH)
    // =============================================
    if (isCorrect) {
        streak++;
        if (streak > maxStreak) maxStreak = streak;
    } else {
        streak = 0;
    }
   
    // =============================================
    // 🔥 TRACK EVERYTHING (ONE LOCATION ONLY)
    // =============================================
    sendGameData({
        game: "The Foundry",
        event: "question",
        user: username || "anonymous",
        room: room,
        question: currentQuestion.id || "unknown",
        correct: isCorrect ? 1 : 0,
        tag: currentQuestion.tag || "none",
        type: currentQuestion.type || "none",
        objective: inferObjective(currentQuestion),
        responseTime: responseTime,
	     attempt: totalAttempts ?? 0,
		  streak: streak ?? 0,
		  elapsedTime: startTime ? (Date.now() - startTime) : 0,
          adaptiveMode: adaptiveMode
    });

    // =============================================
    // ✅ CORRECT ANSWER LOGIC
    // =============================================
    if (isCorrect) {
        if(isBossRoom){
        sfxCorrect.pause();
        sfxCorrect.currentTime = 0;

        sfxBossHit.pause();
        sfxBossHit.currentTime = 0;
        sfxBossHit.play().catch(()=>{});
    } else {
        sfxBossHit.pause();
        sfxBossHit.currentTime = 0;

        sfxCorrect.pause();
        sfxCorrect.currentTime = 0;
        sfxCorrect.play().catch(()=>{});
    }
        wizardSpeak(getWizardFeedback("correct"));
       
        wizard.style.transform = "scale(1.1)";
        setTimeout(()=>{
        wizard.style.transform = "";
        },200);
       
        // --- STAGED REMEDIATION SUCCESS PATH ---
        if(remediationState.active){
           if(remediationState.stage === "repair"){
               remediationState.stage = "bridge";
               adaptiveMode = "bridge";
               const bridgeQuestion = getRemediationQuestion(remediationState);
               if(bridgeQuestion){
                   currentQuestion = shuffleOptions(bridgeQuestion);
                   document.getElementById("question").innerText = `${getRemediationStageLabel("bridge")}: ` + currentQuestion.q;
                   document.getElementById("formulaHint").innerText = currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";
                   msgElement.innerHTML = `<span class='fade-out-text'>Stability returns. Now prove it under pressure.</span>`;
                   displayQuestion();
                   return;
               }
               remediationState.stage = "retest";
           }

           if(remediationState.stage === "bridge"){
               remediationState.stage = "retest";
               adaptiveMode = "retest";
               const retestQuestion = getRemediationQuestion(remediationState);
               if(retestQuestion){
                   currentQuestion = shuffleOptions(retestQuestion);
                   document.getElementById("question").innerText = `${getRemediationStageLabel("retest")}: ` + currentQuestion.q;
                   document.getElementById("formulaHint").innerText = currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";
                   msgElement.innerHTML = `<span class='fade-out-text'>Concept recovered. One final proof.</span>`;
                   displayQuestion();
                   return;
               }
           }

           const returnRoom = remediationState.returnRoom ?? room;
           resetRemediationState();
           adaptiveMode = "support";
           msgElement.innerHTML = `<span class='fade-out-text'>Recovery confirmed. Return to the forge.</span>`;
           room = returnRoom;
           localStorage.setItem("gauntletRoom", room);
           setTimeout(loadQuestion, TIMING.normal);
           return;
    }
        correctAnswers++;
        handleStreakVisuals();
    
        // --- LEARNING: reduce weakness ---
        if(currentQuestion.tag){
            const expected = getTypeTargetMs(currentQuestion.type);
            const speedBonus = responseTime <= expected * 0.85 ? 0.45 : responseTime <= expected * 1.15 ? 0.3 : 0.15;
            conceptMemory[currentQuestion.tag] = Math.max(0,
            ((conceptMemory[currentQuestion.tag] || 0) * 0.68) - speedBonus);
        }
        
       // --- BOSS HIT LOGIC ---
        if(isBossRoom){
        bossHealth--;
        
        msgElement.innerHTML = `<span style='color:#f87171;font-weight:bold;'>⚔ HIT! Boss Health: ${bossHealth}/3</span>`;
        triggerBossShake();
        
        if (bossHealth > 0) {
           setTimeout(loadQuestion, TIMING.boss);
           return;
        }
         // Boss defeated
         sendGameData({
            game: "The Foundry",
            event: "boss_defeated",
            user: username,
            room: room
         });
           
         bossPool = [];
           
        // Boss defeated (CHANGE ARTIFACT NAMES)
        if(room === 10){
        document.getElementById("vaultHeart").classList.add("unlocked");
        localStorage.setItem("vaultHeart", "true");
        showArtifact(artifacts.heart.img, artifacts.heart.title, artifacts.heart.text);
        }

        if(room === 20){
        document.getElementById("vaultCore").classList.add("unlocked");
        localStorage.setItem("vaultCore", "true");
        showArtifact(artifacts.core.img, artifacts.core.title, artifacts.core.text);
        }

        if(room === 30){
        document.getElementById("vaultCrown").classList.add("unlocked");
        localStorage.setItem("vaultCrown", "true");
        showArtifact(artifacts.crown.img, artifacts.crown.title, artifacts.crown.text);
        }

// ... (Inside the Boss Victory check)
        showKnowledgeRoom(room);
        bossHealth = 3;
        bossPool = []; // Clear the pool so the next boss is fresh
        return; 
    } // <--- THIS ends the "if(isBossRoom)" block

    // --- NORMAL ROOM PROGRESSION ---
    // This code ONLY runs if choice === currentQuestion.a 
    // AND it wasn't a Boss Room (or a Detour).
   msgElement.innerHTML = "";
   room++;
   localStorage.setItem("gauntletRoom", room);
   showHallwayTransition(currentQuestion.feedback);
   return;
    }      
// =============================================
// ❌ WRONG ANSWER BLOCK — ALL FAILURE LOGIC
// =============================================
       
    if (isBossRoom) {
        sfxWrong.volume = 0.7;
    } else {
        sfxWrong.volume = 0.5;
    }

    sfxWrong.currentTime = 0;
    sfxWrong.play().catch(() => {});

    wizardSpeak(getWizardFeedback("wrong"));

    wizard.style.transform = "translateX(-6px)";
    setTimeout(() => {
        wizard.style.transform = "translateX(6px)";
        setTimeout(() => {
            wizard.style.transform = "";
        }, 100);
    }, 100);

    // --- LEARNING: increase weakness ---
    if (currentQuestion.tag) {
        const expected = getTypeTargetMs(currentQuestion.type);
        const rushPenalty = responseTime < expected * 0.65 ? 1.25 : 1;
        conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) + rushPenalty;
    }

    // --- STAGED REMEDIATION TRIGGER ---
    if (!remediationState.active && currentQuestion.tag && shouldTriggerDetour(currentQuestion)) {
        remediationState = planRemediation(currentQuestion, responseTime) || remediationState;
        detourActive = true;
        detourReturnRoom = room;

        const remediationPrompt = getRemediationQuestion(remediationState);

        if (remediationPrompt) {
            currentQuestion = shuffleOptions(remediationPrompt);
            adaptiveMode = remediationState.stage;

            document.getElementById("question").innerText = `${getRemediationStageLabel(remediationState.stage)}: ` + currentQuestion.q;
            document.getElementById("formulaHint").innerText =
                currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";

            const remediationMessage = remediationState.careless
                ? "You rushed the metal. Slow down and prove command."
                : remediationState.slowStruggle
                    ? "The forge resists. Rebuild the concept before advancing."
                    : "The structure cracked. Repair it before moving on.";

            msgElement.innerHTML = `<span class='fade-out-text'>${remediationMessage}</span>`;

            displayQuestion();
            return;
        }
    }

    // --- FALLBACK LOGIC ---
    document.getElementById("streakDisplay").innerText = "";

    bossHealth = 3;
    bossPool = [];

	let fallback = (room % 10 === 0 ? 3 : (room >= 21 ? 2 : 1));
	let newRoom = room - fallback;

// Never fall back behind the most recently cleared boss gate
	room = Math.max(bossCheckpoint, newRoom);

    localStorage.setItem("gauntletRoom", room);

    alert(`Incorrect! You trip in the darkness and tumble back to Room ${room}.`);

    loadQuestion();
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|FOUNDRY98`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "FOUND-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

// =============================================
// RESULT SHARING — SAFE TO CUSTOMIZE
// =============================================
// Copies player performance summary to clipboard.
//
// Includes:
// - name
// - time
// - accuracy
// - streak
// - verification code
//
// SAFE TO EDIT:
// - text format
// - labels ("Adventurer", etc.)
// - button feedback message
//
// WARNING:
// Requires element IDs:
// - "vCode"
// - "shareBtn"
//
// Removing those will break this function.
// =============================================     
function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);

    const shareText = `Adventurer: ${username}
        Time: ${timeString}
        Accuracy: ${accuracy}%
        Best Streak: ${maxStreak}
        Total Questions: ${totalAttempts}
        Code: ${code}
        Verified by The Forgemaster`;

    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        const originalColor = btn.style.background;

        btn.innerText = "✅ Copied!";
        btn.style.background = "#059669";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = originalColor;
        }, 2000);
    });
}
